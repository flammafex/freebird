# This is a template for creating Kubernetes secrets
# DO NOT commit actual secrets to version control!
# Instead, use a secrets management solution like:
# - sealed-secrets: https://github.com/bitnami-labs/sealed-secrets
# - External Secrets Operator: https://external-secrets.io/
# - Vault: https://www.vaultproject.io/
# - AWS Secrets Manager
# - Google Secret Manager
#
# To use this template:
# 1. Generate strong random values
# 2. Create the secret manually: kubectl create secret ...
# 3. Or use your secrets management tool
#
# Example using kubectl:
# kubectl create secret generic admin-credentials \
#   --from-literal=admin-api-key='your-strong-random-key-here' \
#   -n freebird
#
# kubectl create secret generic redis-credentials \
#   --from-literal=password='your-redis-password-here' \
#   -n freebird
#
# kubectl create secret generic verifier-keys \
#   --from-literal=verifier-sk-b64='base64url-raw-32-byte-v4-key' \
#   -n freebird
#
# kubectl create secret generic webauthn-credentials \
#   --from-literal=proof-secret='your-strong-random-webauthn-proof-secret' \
#   -n freebird

---
apiVersion: v1
kind: Secret
metadata:
  name: admin-credentials
  namespace: freebird
  labels:
    app: freebird
type: Opaque
stringData:
  # CHANGE THIS! Generate with: openssl rand -base64 32
  admin-api-key: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: freebird
  labels:
    app: freebird
type: Opaque
stringData:
  # CHANGE THIS! Generate with: openssl rand -base64 32
  password: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"

---
apiVersion: v1
kind: Secret
metadata:
  name: verifier-keys
  namespace: freebird
  labels:
    app: freebird
type: Opaque
stringData:
  # CHANGE THIS! Base64url raw 32-byte verifier key material.
  verifier-sk-b64: "CHANGE_ME_BASE64URL_RAW_32_BYTE_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: webauthn-credentials
  namespace: freebird
  labels:
    app: freebird
type: Opaque
stringData:
  # CHANGE THIS! Generate with: openssl rand -base64 32
  proof-secret: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"
