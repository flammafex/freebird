name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: git.carpocratian.org
  IMAGE_PREFIX: git.carpocratian.org/sibyl/freebird

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target: [issuer, verifier]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Forgejo registry
        run: echo "${{ github.token }}" | docker login git.carpocratian.org -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}-${{ matrix.target }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REF="${{ github.ref }}"
          TAGS="${IMAGE}:${SHA}"
          if [ "$REF" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          if echo "$REF" | grep -q '^refs/tags/v'; then
            VERSION="${REF#refs/tags/v}"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            TAGS="${TAGS},${IMAGE}:${MAJOR_MINOR}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IFS=',' read -ra TAG_LIST <<< "${{ steps.tags.outputs.tags }}"
          TAG_ARGS=""
          for t in "${TAG_LIST[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $t"
          done
          docker build $TAG_ARGS --target ${{ matrix.target }} .
          for t in "${TAG_LIST[@]}"; do
            docker push "$t"
          done
