version: '3.8'

services:
  # ============================================================================
  # ISSUER
  # ============================================================================
  issuer:
    build:
      context: .
      target: issuer
    image: ${ISSUER_IMAGE:-ghcr.io/flammafex/freebird-issuer:latest}
    container_name: freebird-issuer
    restart: unless-stopped

    # Run validation script before starting
    entrypoint: ["/bin/sh", "-c", "scripts/validate-env.sh && exec freebird-issuer"]

    # Port bindings - production: use reverse proxy instead
    ports:
      - "${ISSUER_BIND_ADDR:-127.0.0.1:8081}:8081"

    # Data persistence
    volumes:
      - issuer-data:/data:rw
      # Optional: bind mount for key backups
      - ./backups/issuer:/backups:rw

    # Configuration
    env_file:
      - .env
    environment:
      - RUST_LOG=${RUST_LOG:-info,freebird=debug}
      - LOG_FORMAT=${LOG_FORMAT:-plain}
      - ISSUER_ID=${ISSUER_ID:-issuer:docker:v4}
      - BIND_ADDR=${ISSUER_BIND_ADDR:-0.0.0.0:8081}
      - REQUIRE_TLS=${REQUIRE_TLS:-false}
      - BEHIND_PROXY=${BEHIND_PROXY:-false}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ISSUER_SK_PATH=${ISSUER_SK_PATH:-/data/keys/issuer_sk.bin}
      - KEY_ROTATION_STATE_PATH=${KEY_ROTATION_STATE_PATH:-/data/keys/key_rotation_state.json}
      - EPOCH_DURATION=${EPOCH_DURATION:-1d}
      - EPOCH_RETENTION=${EPOCH_RETENTION:-2}
      - SYBIL_RESISTANCE=${SYBIL_RESISTANCE:-invitation}
      - SYBIL_REPLAY_STORE=${SYBIL_REPLAY_STORE:-redis}
      - SYBIL_REPLAY_REDIS_URL=${SYBIL_REPLAY_REDIS_URL:-redis://redis:6379}
      - SYBIL_INVITE_PER_USER=${SYBIL_INVITE_PER_USER:-5}
      - SYBIL_INVITE_COOLDOWN=${SYBIL_INVITE_COOLDOWN:-1h}
      - SYBIL_INVITE_EXPIRES=${SYBIL_INVITE_EXPIRES:-30d}
      - SYBIL_INVITE_NEW_USER_WAIT=${SYBIL_INVITE_NEW_USER_WAIT:-30d}
      - SYBIL_INVITE_PERSISTENCE_PATH=${SYBIL_INVITE_PERSISTENCE_PATH:-/data/state/invitations.json}
      - SYBIL_INVITE_AUTOSAVE_INTERVAL=${SYBIL_INVITE_AUTOSAVE_INTERVAL:-5m}
      - SYBIL_INVITE_SIGNING_KEY_PATH=${SYBIL_INVITE_SIGNING_KEY_PATH:-/data/keys/invitation_signing_key.bin}
      - SYBIL_INVITE_BOOTSTRAP_USERS=${SYBIL_INVITE_BOOTSTRAP_USERS:-admin:100}

    # Networking
    networks:
      - freebird-net
    links:
      - redis

    # Health checks for orchestration
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "X-Admin-Key: ${ADMIN_API_KEY}", "http://localhost:8081/admin/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ============================================================================
  # VERIFIER
  # ============================================================================
  verifier:
    build:
      context: .
      target: verifier
    image: ${VERIFIER_IMAGE:-ghcr.io/flammafex/freebird-verifier:latest}
    container_name: freebird-verifier
    restart: unless-stopped

    # Run validation script before starting
    entrypoint: ["/bin/sh", "-c", "scripts/validate-env.sh && exec freebird-verifier"]

    # Port bindings - production: use reverse proxy instead
    ports:
      - "${VERIFIER_BIND_ADDR:-127.0.0.1:8082}:8082"

    # Configuration
    env_file:
      - .env
    volumes:
      - issuer-data:/issuer-data:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info,freebird=debug}
      - LOG_FORMAT=${LOG_FORMAT:-plain}
      - BIND_ADDR=${VERIFIER_BIND_ADDR:-0.0.0.0:8082}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - VERIFIER_ID=${VERIFIER_ID:-verifier:docker:v4}
      - VERIFIER_AUDIENCE=${VERIFIER_AUDIENCE:-docker}
      - ISSUER_URL=${ISSUER_URL:-http://issuer:8081/.well-known/issuer}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REFRESH_INTERVAL_MIN=${REFRESH_INTERVAL_MIN:-10}
      - EPOCH_DURATION_SEC=${VERIFIER_EPOCH_DURATION_SEC:-86400}
      - EPOCH_RETENTION=${VERIFIER_EPOCH_RETENTION:-2}
      - VERIFIER_SK_PATH=${VERIFIER_SK_PATH:-/issuer-data/keys/issuer_sk.bin}

    # Networking
    networks:
      - freebird-net
    depends_on:
      issuer:
        condition: service_healthy
      redis:
        condition: service_started

    # Health checks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ============================================================================
  # REDIS (Nullifier Cache & Persistence)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: freebird-redis
    restart: unless-stopped

    # Data persistence with AOF
    command: redis-server --appendonly yes --appendfsync everysec

    # Storage
    volumes:
      - redis-data:/data:rw

    # Networking - internal only
    networks:
      - freebird-net
    expose:
      - "6379"

    # Health checks
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  redis-data:
    driver: local
  issuer-data:
    driver: local

networks:
  freebird-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-freebird
